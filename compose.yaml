version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: product_postgres

    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: tyoma
      POSTGRES_PASSWORD: 123

    ports:
      - "5432:5432"
    restart: unless-stopped

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  # ДОБАВЛЯЕМ REDIS
  redis:
    image: redis:7-alpine 
    container_name: my-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: