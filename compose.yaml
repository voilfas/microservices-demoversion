version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: product_postgres

    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: tyoma
      POSTGRES_PASSWORD: 123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: